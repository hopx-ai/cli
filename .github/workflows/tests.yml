name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      # tsc currently reports ~31 pre-existing errors in files that
      # predate the 0.2.0 migration (property-name drift, unused
      # imports, one missing SDK method). These are tracked for
      # cleanup in a follow-up. Do not block CI on them yet; fail
      # loudly if new errors are introduced is a separate concern.
      - name: Type check (non-blocking)
        run: bun run typecheck
        continue-on-error: true

      - name: Build (node target)
        run: bun run build

      - name: Smoke test compiled bundle
        run: node bin/hopx.js --version
